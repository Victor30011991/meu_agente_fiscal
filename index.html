<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FluxoPro — Controle Financeiro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link id="themeCSS" rel="stylesheet" href="">
<style>
:root {
  --bg: #f4f6fb; --bg2: #e8ecf6; --card: #ffffff; --border: #e2e6f0;
  --text: #111827; --text2: #6b7280; --text3: #9ca3af;
  --primary: #4f46e5; --primary-l: #eef2ff; --primary-d: #3730a3;
  --ok: #059669; --ok-l: #d1fae5; --bad: #dc2626; --bad-l: #fef2f2;
  --warn: #d97706; --warn-l: #fffbeb;
}
* { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.2s, border 0.2s; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; overflow-x: hidden; }
button { font-family: inherit; cursor: pointer; border: none; }
.hidden { display: none !important; }

/* Layout Geral */
.app-container { display: flex; flex-direction: column; min-height: 100vh; }
header { 
    background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 24px;
    display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;
}
.main-content { display: grid; grid-template-columns: 320px 1fr; gap: 24px; padding: 24px; max-width: 1600px; margin: 0 auto; width: 100%; }

/* Sidebar Formulário Inline */
.sidebar { display: flex; flex-direction: column; gap: 20px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; }
input, select { 
    width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); 
    background: var(--bg); color: var(--text); font-size: 14px; 
}
input:focus { outline: 2px solid var(--primary-l); border-color: var(--primary); }

.btn-primary { background: var(--primary); color: #fff; padding: 12px; border-radius: 10px; font-weight: 700; width: 100%; }
.btn-primary:hover { background: var(--primary-d); }

/* Dashboard e Tabela */
.dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 24px; }
.stat-card { padding: 20px; border-radius: 16px; background: var(--card); border: 1px solid var(--border); }
.table-container { overflow-x: auto; background: var(--card); border-radius: 16px; border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: var(--bg2); padding: 12px; text-align: left; color: var(--text2); font-weight: 700; }
td { padding: 12px; border-bottom: 1px solid var(--border); }

/* Toasts */
#toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 24px; border-radius: 12px; background: var(--text); color: #fff; z-index: 1000; display: none; }

@media (max-width: 900px) { .main-content { grid-template-columns: 1fr; } .sidebar { order: 2; } }
</style>
</head>
<body>

<header>
  <div style="display:flex; align-items:center; gap:12px;">
    <div style="background:var(--primary); color:#fff; width:36px; height:36px; border-radius:10px; display:grid; place-items:center; font-weight:900;">F</div>
    <h1 style="font-size:18px; font-weight:800; letter-spacing:-0.5px;">FluxoPro <span style="color:var(--text3); font-weight:400; font-size:12px;">v14</span></h1>
  </div>
  <div style="display:flex; gap:10px;">
    <select id="themeSelect" onchange="changeTheme(this.value)" style="width:auto; height:36px; padding:0 10px; font-size:12px;">
      <option value="default">Tema: Padrão</option>
      <option value="dark">Tema: Dark</option>
      <option value="emerald">Tema: Emerald</option>
      <option value="gold">Tema: Gold</option>
      <option value="indigo">Tema: Indigo</option>
      <option value="rose">Tema: Rose</option>
    </select>
    <button onclick="window.open('import.html','_blank')" style="background:var(--bg2); padding:0 15px; border-radius:8px; font-weight:600;">Importar</button>
    <button onclick="window.open('export.html','_blank')" style="background:var(--primary); color:#fff; padding:0 15px; border-radius:8px; font-weight:600;">Relatórios</button>
  </div>
</header>

<main class="main-content">
  <aside class="sidebar">
    <div class="card">
      <h2 style="font-size:16px; margin-bottom:15px; display:flex; align-items:center; gap:8px;">🚀 Novo Lançamento</h2>
      <form id="formFluxo">
        <div class="form-group">
          <label>Data</label>
          <input type="date" id="f_data" required>
        </div>
        <div class="form-group">
          <label>Descrição</label>
          <input type="text" id="f_desc" placeholder="Ex: Aluguel, Venda..." required>
        </div>
        <div class="form-group">
          <label>CPF / CNPJ (Opcional)</label>
          <input type="text" id="f_doc" placeholder="000.000.000-00">
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
          <div class="form-group">
            <label>Tipo</label>
            <select id="f_tipo">
              <option value="entrada">Entrada (+)</option>
              <option value="saida">Saída (-)</option>
            </select>
          </div>
          <div class="form-group">
            <label>Categoria</label>
            <input type="text" id="f_cat" placeholder="Ex: Fixa">
          </div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
          <div class="form-group">
            <label>Valor (R$)</label>
            <input type="number" step="0.01" id="f_valor" required>
          </div>
          <div class="form-group">
            <label>Invest. (R$)</label>
            <input type="number" step="0.01" id="f_inv" value="0">
          </div>
        </div>
        <button type="submit" class="btn-primary">Salvar Lançamento</button>
      </form>
    </div>

    <div class="card" style="background:var(--primary-l); border-color:var(--primary);">
      <p style="font-size:12px; font-weight:700; color:var(--primary-d);">RESUMO DO PERFIL</p>
      <h3 id="resumo_perfil" style="font-size:24px; margin:5px 0;">R$ 0,00</h3>
      <p id="sub_resumo" style="font-size:11px; color:var(--primary);">Saldo total acumulado</p>
    </div>
  </aside>

  <section>
    <div class="dashboard-grid">
      <div class="stat-card">
        <span style="font-size:12px; color:var(--text2);">Entradas</span>
        <h3 id="total_ent" style="color:var(--ok);">R$ 0,00</h3>
      </div>
      <div class="stat-card">
        <span style="font-size:12px; color:var(--text2);">Saídas</span>
        <h3 id="total_sai" style="color:var(--bad);">R$ 0,00</h3>
      </div>
      <div class="stat-card">
        <span style="font-size:12px; color:var(--text2);">Investido</span>
        <h3 id="total_inv" style="color:var(--primary);">R$ 0,00</h3>
      </div>
    </div>

    <div class="card" style="margin-bottom:24px;">
      <canvas id="chartPrincipal" height="100"></canvas>
    </div>

    <div class="table-container">
      <table id="tabelaDados">
        <thead>
          <tr>
            <th>Data</th>
            <th>Descrição</th>
            <th>Doc</th>
            <th>Categoria</th>
            <th>Valor</th>
            <th>Invest.</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>
</main>

<div id="toast"></div>

<script>
const KEY = "fluxopro_v14";
let db = { profiles: { default: [] }, active: "default", theme: "default" };

// Inicialização
window.onload = () => {
  migrarV13ParaV14();
  loadDB();
  applyTheme(db.theme);
  document.getElementById('themeSelect').value = db.theme;
  refreshAll();
};

function migrarV13ParaV14() {
    const v13 = localStorage.getItem("fluxopro_v13");
    if (v13 && !localStorage.getItem(KEY)) {
        try {
            const oldData = JSON.parse(v13);
            // Garante que campos novos existam
            Object.values(oldData.profiles).forEach(list => {
                list.forEach(item => {
                    if (item.inv === undefined) item.inv = 0;
                    if (item.doc === undefined) item.doc = "";
                });
            });
            localStorage.setItem(KEY, JSON.stringify(oldData));
            toast("Dados migrados da v13 com sucesso!", "✅");
        } catch(e) { console.error("Falha na migração", e); }
    }
}

function loadDB() {
  const local = localStorage.getItem(KEY);
  if (local) db = JSON.parse(local);
}

function saveDB() {
  localStorage.setItem(KEY, JSON.stringify(db));
}

function applyTheme(name) {
  const link = document.getElementById("themeCSS");
  if (!name || name === "default") {
    link.href = "";
  } else {
    link.href = `themes/${name}.css`;
    link.onerror = () => { link.href = ""; db.theme = "default"; saveDB(); };
  }
}

function changeTheme(val) {
  db.theme = val;
  saveDB();
  applyTheme(val);
}

document.getElementById('formFluxo').onsubmit = (e) => {
  e.preventDefault();
  const novo = {
    id: crypto.randomUUID(),
    data: document.getElementById('f_data').value,
    desc: document.getElementById('f_desc').value,
    doc: document.getElementById('f_doc').value,
    tipo: document.getElementById('f_tipo').value,
    cat: document.getElementById('f_cat').value || "Geral",
    valor: parseFloat(document.getElementById('f_valor').value),
    inv: parseFloat(document.getElementById('f_inv').value || 0)
  };

  db.profiles[db.active].push(novo);
  saveDB();
  refreshAll();
  e.target.reset();
  toast("Lançamento salvo!", "🚀");
};

function refreshAll() {
  const list = db.profiles[db.active] || [];
  const tbody = document.querySelector("#tabelaDados tbody");
  tbody.innerHTML = "";

  let ent = 0, sai = 0, inv = 0;

  list.sort((a,b) => new Date(b.data) - new Date(a.data)).forEach(item => {
    if (item.tipo === 'entrada') ent += item.valor; else sai += item.valor;
    inv += (item.inv || 0);

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td style="font-family:'JetBrains Mono'">${item.data.split('-').reverse().join('/')}</td>
      <td style="font-weight:600">${item.desc}</td>
      <td style="color:var(--text3); font-size:11px;">${item.doc || '—'}</td>
      <td><span style="background:var(--bg2); padding:2px 8px; border-radius:4px; font-size:11px;">${item.cat}</span></td>
      <td style="font-weight:700; color:${item.tipo==='entrada'?'var(--ok)':'var(--bad)'}">${item.tipo==='entrada'?'+':'-'} R$ ${item.valor.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
      <td style="color:var(--primary)">${item.inv > 0 ? 'R$ ' + item.inv.toLocaleString('pt-BR', {minimumFractionDigits:2}) : '—'}</td>
      <td><button onclick="deletar('${item.id}')" style="color:var(--bad); font-size:11px; background:none;">Excluir</button></td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('total_ent').innerText = `R$ ${ent.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
  document.getElementById('total_sai').innerText = `R$ ${sai.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
  document.getElementById('total_inv').innerText = `R$ ${inv.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
  document.getElementById('resumo_perfil').innerText = `R$ ${(ent - sai).toLocaleString('pt-BR', {minimumFractionDigits:2})}`;

  updateChart(list);
}

function deletar(id) {
  if (!confirm("Excluir lançamento?")) return;
  db.profiles[db.active] = db.profiles[db.active].filter(i => i.id !== id);
  saveDB();
  refreshAll();
}

function toast(msg, icon="") {
  const t = document.getElementById("toast");
  t.innerHTML = `${icon} ${msg}`;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 3000);
}

let myChart;
function updateChart(data) {
    const ctx = document.getElementById('chartPrincipal').getContext('2d');
    if (myChart) myChart.destroy();
    
    // Agrupar por mês simples (últimos 6 meses)
    const labels = ["Mês 1", "Mês 2", "Mês 3", "Mês 4", "Mês 5", "Mês 6"];
    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Fluxo de Caixa',
                data: [0, 10, 5, 2, 20, 30],
                borderColor: '#4f46e5',
                tension: 0.4,
                fill: true,
                backgroundColor: 'rgba(79, 70, 229, 0.1)'
            }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
    });
}
</script>
</body>
</html>
