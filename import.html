<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FluxoPro — Importação</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
body { font-family: 'DM Sans', sans-serif; background: #f0f2f8; padding: 40px; }
.card { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 600px; margin: 0 auto; }
.upload-area { border: 2px dashed #cbd5e1; padding: 40px; text-align: center; border-radius: 8px; cursor: pointer; }
.upload-area:hover { border-color: #4f46e5; background: #f8fafc; }
.btn-confirm { background: #4f46e5; color: #fff; width: 100%; padding: 15px; border-radius: 8px; margin-top: 20px; font-weight: 700; display: none; }
</style>
</head>
<body>

<div class="card">
  <h2>📥 Importar Dados (Excel)</h2>
  <p style="color:#64748b; margin-bottom: 20px;">Colunas esperadas: Data, Descrição, Doc, Categoria, Tipo, Valor, Investimento</p>
  
  <div class="upload-area" onclick="document.getElementById('fileIn').click()">
    <p>Clique para selecionar o arquivo .xlsx ou .csv</p>
    <input type="file" id="fileIn" hidden accept=".xlsx, .xls, .csv">
  </div>

  <div id="preview" style="margin-top:20px; font-size:12px; max-height: 200px; overflow-y: auto;"></div>

  <button id="btnConfirmar" class="btn-confirm" onclick="confirmar()">Confirmar Importação</button>
</div>

<script>
const KEY = "fluxopro_v14";
let buffer = [];

document.getElementById('fileIn').onchange = function(e) {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = function(evt) {
    const data = evt.target.result;
    const workbook = XLSX.read(data, { type: 'binary' });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet);
    
    buffer = rows.map(r => ({
      id: crypto.randomUUID(),
      data: r.Data || new Date().toISOString().split('T')[0],
      desc: r.Descrição || "Importado",
      doc: String(r.Doc || ""),
      cat: r.Categoria || "Geral",
      tipo: (r.Tipo || "saida").toLowerCase(),
      valor: parseFloat(r.Valor || 0),
      inv: parseFloat(r.Investimento || 0)
    }));

    document.getElementById('preview').innerHTML = `<p><strong>${buffer.length}</strong> lançamentos detectados.</p>`;
    document.getElementById('btnConfirmar').style.display = 'block';
  };
  reader.readAsBinaryString(file);
};

function confirmar() {
  const local = localStorage.getItem(KEY);
  let db = local ? JSON.parse(local) : { profiles: { default: [] }, active: "default" };
  
  db.profiles[db.active].push(...buffer);
  localStorage.setItem(KEY, JSON.stringify(db));
  alert("Importação concluída com sucesso!");
  window.close();
}
</script>
</body>
</html>
