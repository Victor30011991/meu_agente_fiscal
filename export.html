<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FluxoPro — Relatório PDF</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<style>
  body { font-family: sans-serif; display: grid; place-items: center; height: 100vh; background: #f0f2f8; }
  .btn { background: #4f46e5; color: #fff; padding: 20px 40px; border-radius: 12px; font-weight: 700; font-size: 18px; text-decoration: none; }
</style>
</head>
<body>

<a href="#" class="btn" onclick="gerarPDF()">Gerar Relatório Completo (PDF)</a>

<script>
async function gerarPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF('p', 'mm', 'a4');
  const KEY = "fluxopro_v14";
  const data = JSON.parse(localStorage.getItem(KEY) || '{"profiles":{"default":[]},"active":"default"}');
  const items = data.profiles[data.active] || [];

  doc.setFontSize(20);
  doc.text("Relatório FluxoPro v14", 14, 20);
  
  const tableData = items.map(i => [
    i.data.split('-').reverse().join('/'),
    i.desc,
    i.doc || '—',
    i.cat,
    i.tipo === 'entrada' ? `+ ${i.valor}` : `- ${i.valor}`,
    i.inv || 0
  ]);

  doc.autoTable({
    startY: 30,
    head: [['Data', 'Descrição', 'CPF/CNPJ', 'Categoria', 'Valor (R$)', 'Invest. (R$)']],
    body: tableData,
    theme: 'striped',
    headStyles: { fillColor: [79, 70, 229] }
  });

  doc.save(`relatorio_${new Date().getTime()}.pdf`);
}
</script>
</body>
</html>
